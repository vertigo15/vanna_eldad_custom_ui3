<!DOCTYPE html>
<html>
<head>
    <title>Test Insights Prompt Parsing</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .section { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        .section-title { font-weight: bold; color: #0066cc; margin-bottom: 10px; }
        .section-content { white-space: pre-wrap; background: #f5f5f5; padding: 10px; }
        .stats { background: #e8f4f8; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Insights Prompt Parsing Test</h1>
    
    <div class="stats" id="stats"></div>
    
    <div class="section">
        <div class="section-title">1. Main Instructions & Rules</div>
        <div class="section-content" id="section1"></div>
    </div>
    
    <div class="section">
        <div class="section-title">2. Dataset Summary</div>
        <div class="section-content" id="section2"></div>
    </div>
    
    <div class="section">
        <div class="section-title">3. Column Statistics</div>
        <div class="section-content" id="section3"></div>
    </div>
    
    <div class="section">
        <div class="section-title">4. Output Format</div>
        <div class="section-content" id="section4"></div>
    </div>

    <script>
        // Test prompt (from user's template file)
        const testPrompt = `You are a senior data analyst. Analyze the query results and provide insights.

## RULES
- ONLY report findings you are highly confident about
- Every insight must be backed by specific numbers from the data
- Be concise — max 3-5 key findings
- Match the user's language (English/Hebrew)

## CONFIDENCE THRESHOLDS — REPORT ONLY IF:
- Differences: ≥ 10% from average/baseline (meaningful variation)
- Patterns: Majority (≥60%) or significant minority (≤30%)
- Trends: Clear direction across most data points
- Comparisons: Notable differences between segments

DO NOT report vague findings like "seems to" or "might be".
ALWAYS provide insights when clear patterns exist, even if they're moderate.

## OBSERVABLE PATTERNS TO LOOK FOR:
- Majority behaviors: "X out of Y categories show [pattern]"
- Top/bottom performers: "Top 3 account for X% of total"
- Outliers: Values significantly above/below average
- Trends: Increasing/decreasing patterns
- Comparisons: How segments differ from each other

## USER'S QUESTION:
{original_question}

## BUSINESS RULES:
{business_rules}

## DATASET SUMMARY:
- Total rows: {row_count}
- Columns: {column_names}
- Data sample:
{data_sample}

## COLUMN STATISTICS:
{column_stats}

## OUTPUT FORMAT (respond in JSON):
{{
  "summary": "One sentence summarizing the key takeaway",
  "findings": [
    "Finding 1 with specific numbers",
    "Finding 2 with specific numbers"
  ],
  "suggestions": [
    "Actionable suggestion based on findings"
  ]
}}

If the dataset is too small or no meaningful insights exist, return:
{{
  "summary": "Insufficient data for meaningful insights",
  "findings": [],
  "suggestions": []
}}`;

        // Parsing function (same as in insightsManager.js)
        function parseInsightsPrompt(prompt) {
            const sections = {
                mainInstructions: '',
                datasetSummary: '',
                columnStats: '',
                outputFormat: ''
            };
            
            // Split by section headers
            const datasetSummaryIndex = prompt.indexOf('## DATASET SUMMARY:');
            const columnStatsIndex = prompt.indexOf('## COLUMN STATISTICS:');
            const outputFormatIndex = prompt.indexOf('## OUTPUT FORMAT');
            
            // Extract main instructions (everything before DATASET SUMMARY)
            if (datasetSummaryIndex !== -1) {
                sections.mainInstructions = prompt.substring(0, datasetSummaryIndex).trim();
            } else {
                // Fallback: if no sections found, put everything in main instructions
                sections.mainInstructions = prompt;
                return sections;
            }
            
            // Extract dataset summary (between DATASET SUMMARY and COLUMN STATISTICS)
            if (datasetSummaryIndex !== -1 && columnStatsIndex !== -1) {
                sections.datasetSummary = prompt.substring(datasetSummaryIndex + 19, columnStatsIndex).trim();
            } else if (datasetSummaryIndex !== -1) {
                sections.datasetSummary = prompt.substring(datasetSummaryIndex + 19).trim();
            }
            
            // Extract column statistics (between COLUMN STATISTICS and OUTPUT FORMAT)
            if (columnStatsIndex !== -1 && outputFormatIndex !== -1) {
                sections.columnStats = prompt.substring(columnStatsIndex + 22, outputFormatIndex).trim();
            } else if (columnStatsIndex !== -1) {
                sections.columnStats = prompt.substring(columnStatsIndex + 22).trim();
            }
            
            // Extract output format (from OUTPUT FORMAT to end)
            if (outputFormatIndex !== -1) {
                sections.outputFormat = prompt.substring(outputFormatIndex + 16).trim();
            }
            
            return sections;
        }

        // Test the parsing
        const sections = parseInsightsPrompt(testPrompt);
        
        // Display results
        document.getElementById('section1').textContent = sections.mainInstructions || '(empty)';
        document.getElementById('section2').textContent = sections.datasetSummary || '(empty)';
        document.getElementById('section3').textContent = sections.columnStats || '(empty)';
        document.getElementById('section4').textContent = sections.outputFormat || '(empty)';
        
        // Display statistics
        const stats = `
Total prompt length: ${testPrompt.length} characters

Section lengths:
- Main Instructions: ${sections.mainInstructions.length} chars
- Dataset Summary: ${sections.datasetSummary.length} chars
- Column Statistics: ${sections.columnStats.length} chars
- Output Format: ${sections.outputFormat.length} chars

Section headers found:
- DATASET SUMMARY at index: ${testPrompt.indexOf('## DATASET SUMMARY:')}
- COLUMN STATISTICS at index: ${testPrompt.indexOf('## COLUMN STATISTICS:')}
- OUTPUT FORMAT at index: ${testPrompt.indexOf('## OUTPUT FORMAT')}
        `;
        document.getElementById('stats').textContent = stats;
    </script>
</body>
</html>
